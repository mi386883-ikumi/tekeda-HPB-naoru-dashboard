<div class="mo" id="settingsModal"><div class="ml"><h2>店舗管理・API設定</h2><div class="ml-sub">APIキーは全店舗共通。各店舗のスプレッドシートIDを入力してください。<br>スプレッドシートは「リンクを知っている全員が閲覧可」にしてください。</div><div class="fg"><label class="fl">Google Sheets APIキー</label><input class="fi" id="mApiKey" placeholder="AIza..." /></div><div class="fg"><label class="fl">店舗一覧</label><div class="sl-edit" id="storeListEdit"></div><button class="btn" onclick="addStoreRow()" style="margin-top:5px">＋ 店舗を追加</button></div><div class="ma"><button class="btn" onclick="closeSettings()">キャンセル</button><button class="btn btn-p" onclick="saveSettings()">保存してデータ取得</button></div><div id="sStatus" style="margin-top:10px;font-size:11px;display:none"></div></div></div>

const SC=['#FF6B4A','#3ECFB4','#F0C846','#8B7CF6','#F472B6','#60A5FA','#A3E635','#38BDF8','#FB7185','#FBBF24','#34D399'];
const YEARS=[2025,2026];
let stores=[{name:'大森院',id:'1J5hKWFNcg6O5_xSLlJTKHwDycyEEfldOtsTlD4MgAS4'},{name:'京都花園院',id:'1EqUPDKIxIDQXxv3XzIwQ4kGIVk1MZLk-sCPiLXTzV3c'},{name:'人形町院',id:'1go7qwhsbIg7u3YhjfQOjPeZ9cg5gg9cmplJObfNNZ1Y'},{name:'札幌丸山院',id:'1hweX9VNupsLabLz5srF54YBkG4fpZdmDYKJhvonW8aY'},{name:'新馬場院',id:'1OhRZlpVMhc3rNY72YOwxlsnvqU3jvQPa6JrxTZ9Rmr0'},{name:'神戸住吉院',id:'1B6dGyVM96fNmo2QR71H4eVWS1UJpfbxCa6MEh_IANdA'},{name:'中野院',id:'1BPSi-HNmOn6fiyetVmz8612roavCt9s4vMFZamu2r98'},{name:'大里院',id:'1TOT3uDMxUR8S_cL2bvaELrLkw7U5qskfJOdWQUbPow4'}];
let apiKey='AIzaSyBx1s4wOTZ0kQNEFaxU4982tiUtGVEqrPA';
let storeData={};let liveStores=new Set();let curView='all';let curYear=2025;let curMonth='1月';let curFilterMonth=null;let charts={};let selectedCompareStores=null;
let curHpbStore='大森院';
let hpbStatsByStore={
  '大森院':{reviews:150,reviewsPrev:145,rating:4.75,blogs:598,ranking:9,rankingKeyword:'大森 整体',rankingUrl:'https://beauty.hotpepper.jp/genre/kgkw011/stc0290015/',salonUrl:'https://beauty.hotpepper.jp/kr/slnH000551938/',lastUpdated:'2026-03-28',lastBlogDate:'2026-03-29',lastReviewDate:'2026-03-29',blogFreqDays:2},
  '京都花園院':{reviews:119,reviewsPrev:119,rating:4.94,blogs:466,ranking:1,rankingKeyword:'京都花園 整体',rankingUrl:'https://beauty.hotpepper.jp/genre/kgkw011/stc2206645/',salonUrl:'https://beauty.hotpepper.jp/kr/slnH000655277/',lastUpdated:'2026-03-29',lastBlogDate:'2026-03-29',lastReviewDate:'2026-03-29',blogFreqDays:2},
  '人形町院':{reviews:86,reviewsPrev:86,rating:4.88,blogs:470,ranking:7,rankingKeyword:'人形町 整体',rankingUrl:'https://beauty.hotpepper.jp/genre/kgkw011/stc0070065/',salonUrl:'https://beauty.hotpepper.jp/kr/slnH000655274/',lastUpdated:'2026-03-29',lastBlogDate:'2026-03-29',lastReviewDate:'2026-03-29',blogFreqDays:2},
  '札幌丸山院':{reviews:170,reviewsPrev:170,rating:4.77,blogs:815,ranking:7,rankingKeyword:'円山 整体',rankingUrl:'https://beauty.hotpepper.jp/genre/kgkw011/stc9936210/',salonUrl:'https://beauty.hotpepper.jp/kr/slnH000667105/',lastUpdated:'2026-03-29',lastBlogDate:'2026-03-29',lastReviewDate:'2026-03-29',blogFreqDays:1},
  '新馬場院':{reviews:112,reviewsPrev:112,rating:4.81,blogs:513,ranking:3,rankingKeyword:'大井町 整体',rankingUrl:'https://beauty.hotpepper.jp/genre/kgkw011/stc0290010/',salonUrl:'https://beauty.hotpepper.jp/kr/slnH000577795/',lastUpdated:'2026-03-29',lastBlogDate:'2026-03-29',lastReviewDate:'2026-03-29',blogFreqDays:2},
  '神戸住吉院':{reviews:64,reviewsPrev:64,rating:4.91,blogs:1044,ranking:9,rankingKeyword:'住吉 整体',rankingUrl:'https://beauty.hotpepper.jp/genre/kgkw011/stc2201110/',salonUrl:'https://beauty.hotpepper.jp/kr/slnH000625102/',lastUpdated:'2026-03-29',lastBlogDate:'2026-03-29',lastReviewDate:'2026-03-29',blogFreqDays:1},
  '中野院':{reviews:47,reviewsPrev:47,rating:4.78,blogs:200,ranking:9,rankingKeyword:'中野 整体',rankingUrl:'https://beauty.hotpepper.jp/genre/kgkw011/stc0040005/',salonUrl:'https://beauty.hotpepper.jp/kr/slnH000717232/',lastUpdated:'2026-03-29',lastBlogDate:'2026-03-29',lastReviewDate:'2026-03-29',blogFreqDays:2},
  '大里院':{reviews:39,reviewsPrev:39,rating:4.96,blogs:665,ranking:28,rankingKeyword:'沖縄 整体',rankingUrl:'https://beauty.hotpepper.jp/genre/kgkw011/pre47/',salonUrl:'https://beauty.hotpepper.jp/kr/slnH000708947/',lastUpdated:'2026-03-29',lastBlogDate:'2026-03-29',lastReviewDate:'2026-03-29',blogFreqDays:1}
};
// ブラウザに保存された設定を読み込む
(function(){
  try{
    const saved=localStorage.getItem('hpb_dashboard_config');
    if(saved){
      const c=JSON.parse(saved);
      if(c.stores&&c.stores.length>0)stores=c.stores;
      if(c.apiKey)apiKey=c.apiKey;
      if(c.hpbStatsByStore){Object.keys(c.hpbStatsByStore).forEach(k=>{hpbStatsByStore[k]=Object.assign({},hpbStatsByStore[k]||{},c.hpbStatsByStore[k]);});}
    }
  }catch(e){}

  // ── 自動月次スナップショット ──
  // 新しい月を検知したら reviewsPrev を自動更新し来月のベースラインにする
  try{
    const now=new Date();
    const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const lastSnap=localStorage.getItem('hpb_snapshot_month')||'';
    if(lastSnap && lastSnap!==ym){
      // 新しい月に入った → 全店舗の reviewsPrev を現在の reviews に更新
      Object.keys(hpbStatsByStore).forEach(k=>{
        if(hpbStatsByStore[k].reviews!=null){
          hpbStatsByStore[k].reviewsPrev=hpbStatsByStore[k].reviews;
          hpbStatsByStore[k].snapshotMonth=lastSnap;
        }
      });
      localStorage.setItem('hpb_snapshot_month',ym);
      try{localStorage.setItem('hpb_dashboard_config',JSON.stringify({stores,apiKey,hpbStatsByStore}));}catch(e){}
      window._autoSnapped=lastSnap; // トースト表示フラグ
    } else if(!lastSnap){
      localStorage.setItem('hpb_snapshot_month',ym);
    }
  }catch(e){}
})();

// API fetch — batchGet で効率化（レート制限対策）
function parseRow38(v){return{HPB:v[3]||0,HP:v[4]||0,チラシ:v[5]||0,メタ広告:v[6]||0,minimo:v[7]||0,紹介:v[8]||0,骨Fix:v[9]||0,MEO:v[10]||0,Gマップ:v[11]||0,その他:v[12]||0,total:v[1]||0};}
function parseDailyRows(rows){return rows.map((r,i)=>{const row={day:i+1,dayName:(r[1]||'').toString()};row.HPB=parseInt(r[4])||0;row.HP=parseInt(r[5])||0;row.チラシ=parseInt(r[6])||0;row.メタ広告=parseInt(r[7])||0;row.minimo=parseInt(r[8])||0;row.紹介=parseInt(r[9])||0;row.骨Fix=parseInt(r[10])||0;row.MEO=parseInt(r[11])||0;row.Gマップ=parseInt(r[12])||0;row.その他=parseInt(r[13])||0;row.total=CH.reduce((s,k)=>s+row[k],0);return row;}).filter(r=>r.total>0||r.day<=31);}
async function fetchStore(idx){
  const s=stores[idx];if(!s.id||!apiKey)return null;
  try{
    // 1) シート一覧を取得（1コール）
    const metaRes=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${s.id}?key=${apiKey}&fields=sheets.properties.title`);
    if(!metaRes.ok)return null;
    const titles=(await metaRes.json()).sheets.map(sh=>sh.properties.title);
    const result={};
    for(const year of YEARS){
      const data={monthly:[],daily:{}};
      const ranges=[];const monthMap=[];
      // 名前付きシート（日報 202501 等）
      for(let m=1;m<=12;m++){
        const name=`日報 ${year}${String(m).padStart(2,'0')}`;
        if(!titles.includes(name))continue;
        ranges.push(`'${name}'!B38:N38`);ranges.push(`'${name}'!A3:N33`);
        monthMap.push({month:MO[m-1],m});
      }
      // 「日報」シート（当月分）
      let nippoIdx=-1;
      if(titles.includes('日報')&&year===new Date().getFullYear()){
        ranges.push(`'日報'!A3`);ranges.push(`'日報'!B38:N38`);ranges.push(`'日報'!A3:N33`);
        nippoIdx=monthMap.length;
      }
      if(ranges.length===0)continue;
      // 2) batchGet で一括取得（年あたり1コール）
      const params=ranges.map(r=>`ranges=${encodeURIComponent(r)}`).join('&');
      const batchRes=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${s.id}/values:batchGet?key=${apiKey}&${params}`);
      if(!batchRes.ok)continue;
      const vrs=(await batchRes.json()).valueRanges||[];
      const fetchedMs=new Set();
      // 名前付きシートを処理（各2レンジ：summary+daily）
      for(let i=0;i<monthMap.length;i++){
        const sv=vrs[i*2]?.values?.[0];
        if(sv){const v=sv.map(x=>parseInt(String(x).replace(/,/g,''))||0);data.monthly.push({month:monthMap[i].month,...parseRow38(v)});fetchedMs.add(monthMap[i].m);}
        const dv=vrs[i*2+1]?.values;
        if(dv)data.daily[monthMap[i].month]=parseDailyRows(dv);
      }
      // 「日報」シートを処理（3レンジ：probe+summary+daily）
      if(nippoIdx>=0){
        const base=nippoIdx*2;
        const probeVal=vrs[base]?.values?.[0]?.[0]?.toString()||'';
        const mm=probeVal.match(/^(\d{1,2})\//);
        if(mm){
          const curM=parseInt(mm[1]);
          if(!fetchedMs.has(curM)){
            const sv=vrs[base+1]?.values?.[0];
            if(sv){const v=sv.map(x=>parseInt(String(x).replace(/,/g,''))||0);data.monthly.push({month:MO[curM-1],...parseRow38(v)});}
            const dv=vrs[base+2]?.values;
            if(dv)data.daily[MO[curM-1]]=parseDailyRows(dv);
          }
        }
      }
      data.monthly.sort((a,b)=>MO.indexOf(a.month)-MO.indexOf(b.month));
      if(data.monthly.length>0)result[year]=data;
    }
    return Object.keys(result).length>0?result:null;
  }catch(e){console.error('fetchStore error:',e);return null;}
}

        <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:${col}55;clip-path:inset(0 0 0 0);border-right:2px solid ${col};border-radius:4px"></div>
        <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:${col}">★${r.rating.toFixed(2)}</span>
      </div>
      <span style="font-size:10px;color:var(--txd);width:48px;text-align:right;flex-shrink:0">${r.reviews}件</span>
    </div>`;
  }).join('');
}
function rankMedal(i){return i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style="font-size:11px;font-weight:700;color:var(--txd);display:inline-block;width:20px;text-align:center">${i+1}</span>`;}
function rankCol(i){const c=['#FF6B4A','#3ECFB4','#F0C846','#8B7CF6','#F472B6','#38BDF8','#FBBF24','#A3E635','#6EE7B7','#FCA5A5'];return c[i%c.length];}
function hpbRank(key,unit,top){

}
function blogFreqRank(top){

}

  </div>
  <div class="gf"><div class="cd">
    <div class="ct"><span class="cdot" style="background:#FF6B4A"></span>月別 HPB来店数</div>

    <div class="cb" style="height:280px"><canvas id="cHM"></canvas></div>
  </div></div>
  <div class="gf"><div class="cd">
    <div class="ct"><span class="cdot" style="background:#F0C846"></span>月別 HPB来店数 詳細</div>
    <div class="csu">${curYear}年 月次データ（前月比・累計）— ${curHpbStore}</div>
    <div class="tw" id="hpbTbl"></div>
  </div></div>
  <div class="gf"><div class="cd">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px">
      <div>
        <div class="ct"><span class="cdot" style="background:#F472B6"></span>ホットペッパー サイト情報 — ${curHpbStore}</div>
        <div class="csu">最終確認：${hs.lastUpdated}</div>
      </div>
      <button id="hpbEditBtn" class="btn" onclick="toggleHpbEdit()" style="font-size:11px">✏ 編集</button>
    </div>
    <div id="hpbStatsDisplay" style="display:flex;gap:14px;flex-wrap:wrap">
      <div style="flex:1;min-width:140px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rr);padding:16px 18px;border-top:2px solid #F472B6">
        <div style="font-size:9px;color:var(--txd);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600">口コミ数</div>
        <div style="font-family:'Outfit';font-size:26px;font-weight:700;color:#F472B6;line-height:1">${hs.reviews}<span style="font-size:13px;color:var(--txm);margin-left:5px">件</span></div>
        <div style="font-size:11px;color:var(--txm);margin-top:5px">評価 ★${hs.rating}</div>
      </div>
      <div style="flex:1;min-width:140px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rr);padding:16px 18px;border-top:2px solid #3ECFB4">
        <div style="font-size:9px;color:var(--txd);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600">ブログ投稿数</div>
        <div style="font-family:'Outfit';font-size:26px;font-weight:700;color:#3ECFB4;line-height:1">${hs.blogs}<span style="font-size:13px;color:var(--txm);margin-left:5px">件</span></div>
        <div style="margin-top:5px"><a href="${(hs.salonUrl||'#').replace(/\/?$/,'/')}blog/" target="_blank" style="font-size:10px;color:var(--tl);text-decoration:none">↗ ブログを確認</a></div>
      </div>
      <div style="flex:1;min-width:140px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rr);padding:16px 18px;border-top:2px solid #38BDF8">
        <div style="font-size:9px;color:var(--txd);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600">掲載順位（${hs.rankingKeyword||curHpbStore}）</div>
        <div style="font-family:'Outfit';font-size:26px;font-weight:700;color:#38BDF8;line-height:1">${hs.ranking?hs.ranking+'<span style="font-size:13px;color:var(--txm);margin-left:5px">位</span>':'<span style="font-size:18px;color:var(--txd)">圏外</span>'}</div>
        <div style="margin-top:5px"><a href="${hs.rankingUrl||'#'}" target="_blank" style="font-size:10px;color:var(--tl);text-decoration:none">↗ 検索結果を確認</a></div>
      </div>
      <div style="flex:1;min-width:140px;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--rr);padding:16px 18px;border-top:2px solid var(--txd)">
        <div style="font-size:9px;color:var(--txd);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:600">サロンページ</div>
        <div style="font-size:11px;color:var(--txm);line-height:1.6">NAORU整体 ${curHpbStore}</div>
        <div style="margin-top:8px"><a href="${hs.salonUrl||'#'}" target="_blank" style="font-size:10px;color:var(--tl);text-decoration:none">↗ サロンページを確認</a></div>
      </div>
    </div>
    <div id="hpbEditForm" style="display:none;margin-top:20px;padding-top:18px;border-top:1px solid var(--bd)">
      <div style="font-size:11px;color:var(--txm);margin-bottom:12px">${curHpbStore} の数値を確認・入力して「保存」を押してください。</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <div class="fg" style="flex:1;min-width:130px"><label class="fl">口コミ数（件）</label><input class="fi" id="hpbReviews" type="number" value="${hs.reviews}" /></div>
        <div class="fg" style="flex:1;min-width:130px"><label class="fl">前月口コミ数（件）</label><input class="fi" id="hpbReviewsPrev" type="number" value="${hs.reviewsPrev||hs.reviews}" /><div style="font-size:9px;color:var(--txd);margin-top:3px">先月末時点の口コミ数を入力</div></div>
        <div class="fg" style="flex:1;min-width:130px"><label class="fl">評価スコア（★）</label><input class="fi" id="hpbRating" type="number" step="0.01" value="${hs.rating}" /></div>
        <div class="fg" style="flex:1;min-width:130px"><label class="fl">ブログ投稿数（件）</label><input class="fi" id="hpbBlogs" type="number" value="${hs.blogs}" /></div>
        <div class="fg" style="flex:1;min-width:130px"><label class="fl">掲載順位</label><input class="fi" id="hpbRanking" type="number" value="${hs.ranking}" /></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-p" onclick="saveHpbStats()">保存</button>
        <button class="btn" onclick="toggleHpbEdit()">キャンセル</button>
        <div id="hpbSaveMsg" style="font-size:11px;display:none;color:var(--em)"></div>
      </div>
    </div>
  </div></div>
  </div>`;
  renderHpbTable(monthly);
}

function renderHpbTable(monthly){
  const el=document.getElementById('hpbTbl');if(!el)return;
  let h=`<table><thead><tr><th>月</th><th>HPB来店数</th><th>前月比</th><th>累計</th></tr></thead><tbody>`;
  let cum=0;
  monthly.forEach((x,i)=>{
    cum+=x.hpb;
    const prev=i>0?monthly[i-1].hpb:null;
    let diff='—',dc='var(--txm)';
    if(prev!==null){const d=x.hpb-prev;diff=(d>=0?'+':'')+d;dc=d>0?'var(--em)':d<0?'var(--rs)':'var(--txm)';}
    h+=`<tr><td style="font-weight:600">${x.month}</td><td class="hl">${x.hpb}</td><td style="color:${dc};font-weight:600">${diff}</td><td style="color:var(--txm)">${cum}</td></tr>`;
  });
  const tot=monthly.reduce((s,x)=>s+x.hpb,0);
  h+=`<tr class="rws"><td colspan="2">合計</td><td></td><td class="hl">${tot}</td></tr>`;
  h+=`</tbody></table>`;
  el.innerHTML=h;
}

function initHPBC(){
  const monthly=getHpbMonthly().filter(x=>x.hpb>0);
  if(!monthly.length)return;
  const c=document.getElementById('cHM');if(!c)return;
  charts['cHM']=new Chart(c,{
    type:'line',
    data:{
      labels:monthly.map(x=>x.month),
      datasets:[{
        label:'HPB来店数',
        data:monthly.map(x=>x.hpb),
        borderColor:'#FF6B4A',
        backgroundColor:'rgba(255,107,74,.12)',
        borderWidth:3,
        pointRadius:6,
        pointBackgroundColor:'#FF6B4A',
        pointBorderColor:'#0D1117',
        pointBorderWidth:2,
        pointHoverRadius:8,
        tension:.35,
        fill:true
      }]
    },
    options:{
      ...CO,
      plugins:{
        ...CO.plugins,
        datalabels:{
          display:true,
          color:'#fff',
          font:{weight:'bold',size:11,family:'Outfit'},
          anchor:'top',
          align:'top',
          offset:4,
          formatter:(v)=>v+'人',
          textShadowColor:'rgba(0,0,0,0.8)',
          textShadowBlur:4
        }
      }
    }
  });
}

function toggleHpbEdit(){
  const form=document.getElementById('hpbEditForm');
  const btn=document.getElementById('hpbEditBtn');
  if(!form||!btn)return;
  const opening=form.style.display==='none';
  form.style.display=opening?'block':'none';
  btn.textContent=opening?'✕ 閉じる':'✏ 編集';
}
function saveHpbStats(){
  const reviews=parseInt(document.getElementById('hpbReviews')?.value)||0;
  const reviewsPrev=parseInt(document.getElementById('hpbReviewsPrev')?.value)||reviews;
  const rating=parseFloat(document.getElementById('hpbRating')?.value)||0;
  const blogs=parseInt(document.getElementById('hpbBlogs')?.value)||0;
  const ranking=parseInt(document.getElementById('hpbRanking')?.value)||0;
  const today=new Date().toISOString().slice(0,10);
  if(!hpbStatsByStore[curHpbStore])hpbStatsByStore[curHpbStore]={};
  Object.assign(hpbStatsByStore[curHpbStore],{reviews,reviewsPrev,rating,blogs,ranking,lastUpdated:today});
  try{localStorage.setItem('hpb_dashboard_config',JSON.stringify({stores,apiKey,hpbStatsByStore}));}catch(e){}
  const msg=document.getElementById('hpbSaveMsg');
  if(msg){msg.style.display='block';msg.textContent='✓ '+curHpbStore+' を保存しました（'+today+'）';}
  setTimeout(()=>renderMain(),800);
}
// ===== ここまで =====

function openSettings(){document.getElementById('settingsModal').classList.add('show');document.getElementById('mApiKey').value=apiKey;renderStoreEdit();}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function renderStoreEdit(){const el=document.getElementById('storeListEdit');el.innerHTML=stores.map((s,i)=>`<div class="se-row"><input class="fi se-nm" value="${s.name}" data-idx="${i}" placeholder="店舗名" /><input class="fi" value="${s.id}" data-idx="${i}" placeholder="スプレッドシートID" /><button class="del-b" onclick="delStore(${i})">削除</button></div>`).join('');}
function addStoreRow(){stores.push({name:'',id:''});renderStoreEdit();}
function delStore(i){if(stores.length<=1)return;stores.splice(i,1);storeData={};liveStores.clear();renderStoreEdit();}
function saveSettings(){apiKey=document.getElementById('mApiKey').value.trim();document.querySelectorAll('.se-row').forEach(row=>{const inputs=row.querySelectorAll('input');const idx=parseInt(inputs[0].dataset.idx);if(stores[idx]){stores[idx].name=inputs[0].value.trim();stores[idx].id=inputs[1].value.trim();}});try{localStorage.setItem('hpb_dashboard_config',JSON.stringify({stores,apiKey,hpbStatsByStore}));}catch(e){}fetchAllStores();}
async function refreshData(btn){if(btn){btn.disabled=true;btn.textContent='更新中…';}storeData={};liveStores.clear();await fetchAllStores();if(btn){btn.disabled=false;btn.textContent='↺ 手動更新';}}

renderSidebar();renderMain();
// Auto-fetch on page load for stores with configured spreadsheet IDs
if(stores.some(s=>s.id)&&apiKey){setTimeout(()=>{const el=document.getElementById('mainC');el.innerHTML='<div class="fade" style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px"><div style="width:24px;height:24px;border:2px solid var(--bd);border-top:2px solid var(--ac);border-radius:50%;animation:spin .8s linear infinite"></div><div style="color:var(--txm);font-size:13px">スプレッドシートからデータを取得中…</div></div>';fetchAllStores();},300);}
</script>
